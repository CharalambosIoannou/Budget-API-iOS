<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #1C1C1E; --accent: #30D158; --text: #FFF; --sec: #8E8E93; --blue: #0A84FF; --orange: #FF9F0A; --red: #FF453A; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 110px; -webkit-tap-highlight-color: transparent; }
        
        .top-nav { padding: 60px 20px 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .top-nav h1 { font-size: 32px; margin: 0; font-weight: 700; }
        .profile-btn { width: 36px; height: 36px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #333; color: var(--accent); }

        .content { display: none; padding: 0 20px; animation: fadeIn 0.2s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Metrics */
        .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .m-card { background: var(--card); padding: 15px 5px; border-radius: 16px; text-align: center; border: 1px solid #2C2C2E; }
        .m-label { font-size: 10px; color: var(--sec); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
        .m-val { font-size: 15px; font-weight: 700; }

        /* Feed Section */
        .day-header { display: flex; justify-content: space-between; align-items: center; margin: 30px 0 12px; padding: 0 5px; }
        .day-title { font-size: 18px; font-weight: 700; color: #FFF; }
        .day-title.past { color: var(--sec); font-size: 15px; font-weight: 500; }
        .day-sum { font-size: 14px; font-weight: 600; color: var(--sec); }

        .row { background: var(--card); padding: 16px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border: 1px solid #222; }
        .r-info { display: flex; align-items: center; gap: 12px; }
        .r-icon { width: 44px; height: 44px; background: #2C2C2E; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .r-name { font-weight: 600; font-size: 15px; }
        .r-cat { font-size: 11px; color: var(--sec); }
        .r-amt { font-weight: 700; font-size: 16px; }

        /* Tabs */
        .tabs { position: fixed; bottom: 0; width: 100%; height: 90px; background: rgba(15,15,15,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding-top: 10px; border-top: 0.5px solid #333; z-index: 1000; }
        .tab { display: flex; flex-direction: column; align-items: center; color: var(--sec); font-size: 10px; background: none; border: none; gap: 5px; width: 33%; }
        .tab.active { color: var(--blue); }
        .tab svg { width: 24px; height: 24px; }

        /* Modal */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; }
        .m-content { background:var(--card); width:80%; padding:25px; border-radius:24px; text-align:center; }
        .cat-btn { display:block; width:100%; padding:14px; margin:8px 0; background:#2C2C2E; border-radius:12px; color:#fff; border:none; font-weight:600; }
    </style>
</head>
<body>

    <div class="top-nav">
        <h1 id="title">Activity</h1>
        <div class="profile-btn" onclick="setIncome()">€</div>
    </div>

    <div id="feed" class="content active">
        <div id="pending-section"></div>
        <div id="daily-feed"></div>
    </div>

    <div id="analysis" class="content">
        <div class="metrics">
            <div class="m-card"><div class="m-label">Income</div><div id="stat-inc" class="m-val">€0</div></div>
            <div class="m-card"><div class="m-label">Spent</div><div id="stat-spt" class="m-val">€0</div></div>
            <div class="m-card" style="background:rgba(48,209,88,0.1)"><div class="m-label">Saved</div><div id="stat-svd" class="m-val" style="color:var(--accent)">€0</div></div>
        </div>
        <div style="background:var(--card); padding:20px; border-radius:20px; margin-bottom:20px;">
            <canvas id="pieChart"></canvas>
        </div>
        <div id="leaderboard"></div>
    </div>

    <div id="bills" class="content">
        <div class="m-card" style="width:100%; margin-bottom:25px; box-sizing:border-box;">
            <div class="m-label">Total Monthly Subscriptions</div>
            <div id="bill-total" class="m-val" style="font-size:32px; color:var(--orange); margin-top:5px;">€0</div>
        </div>
        <div id="sub-list"></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('feed', 'Activity', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 14h4v7H4v-7zm6-9h4v16h-4V5zm6 9h4v7h-4v-7z"/></svg>Activity
        </button>
        <button class="tab" onclick="switchTab('analysis', 'Analysis', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.52-4.24 8.99-8.99h-8.99z"/></svg>Analysis
        </button>
        <button class="tab" onclick="switchTab('bills', 'Bills', this)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM5 16H4v-2h1V16zm0-4H4v-2h1V12zm0-4H4V6h1V8zm11 8H8v-2h8v2zm0-4H8v-2h8v2zm0-4H8V6h8v2z"/></svg>Bills
        </button>
    </div>

    <div id="modal">
        <div class="m-content">
            <h3 id="m-vendor" style="margin-top:0">Assign Vendor</h3>
            <div id="cat-btns"></div>
            <button onclick="closeModal()" style="margin-top:20px; background:none; border:none; color:var(--sec)">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxQSHuWmZKLwOHDpDmaNg6RY1ie3eE6b1xVbKa2NkxQ-6T2ksPPW8y5L56XCsjLaY7P5g/exec";
        const ICONS = { "Housing":"🏠", "Food & Dining":"🍔", "Transportation":"🚗", "Coffee":"☕", "Personal Care":"🧴", "Miscellaneous":"📦", "Groceries":"🛒", "Utilities":"⚡" };
        const CATEGORIES = ["Housing", "Food & Dining", "Transportation", "Coffee", "Personal Care", "Miscellaneous", "Groceries", "Utilities"];
        
        let appData = null;
        let myChart = null;
        let activeVendor = "";

        async function init() {
            const res = await fetch(API_URL);
            appData = await res.json();
            renderAll();
        }

        function renderAll() {
            const today = new Date().toISOString().split('T')[0];
            const feed = document.getElementById('daily-feed');
            const dates = Object.keys(appData.daily).sort().reverse();
            
            feed.innerHTML = dates.map(date => {
                const isToday = date === today;
                const displayDate = isToday ? "Today" : new Date(date).toLocaleDateString(undefined, { weekday: 'long', day: 'numeric', month: 'short' });
                return `
                    <div class="day-header">
                        <span class="day-title ${!isToday ? 'past' : ''}">${displayDate}</span>
                        <span class="day-sum">€${appData.daily[date].total.toFixed(2)}</span>
                    </div>
                    ${appData.daily[date].items.map(t => `
                        <div class="row" onclick="openAssign('${t.merchant}')">
                            <div class="r-info">
                                <div class="r-icon">${ICONS[t.category] || "💸"}</div>
                                <div><div class="r-name">${t.merchant}</div><div class="r-cat">${t.category}</div></div>
                            </div>
                            <div class="r-amt">€${t.amount.toFixed(2)}</div>
                        </div>
                    `).join('')}
                `;
            }).join('');

            // Analysis
            document.getElementById('stat-inc').innerText = `€${appData.summary.income}`;
            document.getElementById('stat-spt').innerText = `€${appData.summary.spent.toFixed(0)}`;
            document.getElementById('stat-svd').innerText = `€${appData.summary.saved.toFixed(0)}`;
            
            const labels = Object.keys(appData.categories);
            const vals = Object.values(appData.categories);
            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut', data: { labels: labels, datasets: [{ data: vals, backgroundColor: ['#30D158', '#0A84FF', '#FF9F0A', '#5856D6', '#FF375F', '#64D2FF'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '75%' }
            });
            document.getElementById('leaderboard').innerHTML = labels.map((l, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:15px;">
                    <span>${ICONS[l] || "📦"} ${l}</span><span style="font-weight:700">€${vals[i].toFixed(2)}</span>
                </div>
            `).join('');

            // Bills
            document.getElementById('bill-total').innerText = `€${appData.summary.subsTotal.toFixed(2)}`;
            document.getElementById('sub-list').innerHTML = appData.subscriptions.map(s => `
                <div class="row">
                    <div class="r-info">
                        <div class="r-icon">${ICONS[s.category] || "💳"}</div>
                        <div><div class="r-name">${s.merchant}</div><div class="r-cat">Monthly • Day ${s.day}</div></div>
                    </div>
                    <div class="r-amt">€${s.amount.toFixed(2)}</div>
                </div>
            `).join('');
        }

        function switchTab(id, title, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('title').innerText = title;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function openAssign(v) {
            activeVendor = v; document.getElementById('m-vendor').innerText = v;
            document.getElementById('cat-btns').innerHTML = CATEGORIES.map(c => `<button class="cat-btn" onclick="saveA('${c}')">${c}</button>`).join('');
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        async function saveA(cat) {
            const always = confirm(`Always remember "${activeVendor}" as ${cat}?`);
            closeModal();
            await fetch(`${API_URL}?action=addRule&vendor=${encodeURIComponent(activeVendor)}&category=${encodeURIComponent(cat)}&saveRule=${always}`);
            init();
        }
        async function setIncome() {
            const val = prompt("Enter income for this month:");
            if (!val) return;
            const month = new Date().toISOString().slice(0,7);
            await fetch(`${API_URL}?action=setIncome&month=${month}&amount=${val}`);
            init();
        }

        init();
        document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") init(); });
    </script>
</body>
</html>
