<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Advisor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #1C1C1E; --accent: #30D158; --text: #FFF; --sec: #8E8E93; --blue: #0A84FF; --orange: #FF9F0A; --red: #FF453A; --glass: rgba(20, 20, 22, 0.85); }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 110px; }
        
        .top-nav { padding: 60px 20px 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .content { display: none; padding: 0 20px; }
        .active { display: block; }

        /* Health Bar */
        .health-bar-container { height: 6px; background: #2C2C2E; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .health-fill { height: 100%; transition: width 0.5s, background 0.5s; }
        .health-status { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 20px; }

        /* Featured Day (Today) */
        .today-box { background: linear-gradient(135deg, #1c1c1e 0%, #000 100%); border: 2px solid var(--accent); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(48,209,88,0.1); }
        .today-sum-large { font-size: 38px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }

        /* Warning Boxes */
        .warning-box { background: rgba(255, 69, 58, 0.1); border: 1px solid var(--red); color: var(--red); padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 15px; }

        /* Insights Cards */
        .insight-card { background: var(--card); padding: 16px; border-radius: 16px; border-left: 4px solid var(--blue); margin-bottom: 12px; }
        .insight-title { font-size: 12px; color: var(--sec); text-transform: uppercase; margin-bottom: 4px; }
        .insight-val { font-size: 16px; font-weight: 700; }

        /* Calendar */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 20px 0; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 8px; background: #1C1C1E; color: var(--sec); position: relative; }
        .cal-today { background: var(--blue); color: #fff; font-weight: 800; }
        .cal-bill { border: 1px solid var(--orange); color: var(--orange); }
        .bill-dot { width: 4px; height: 4px; background: var(--orange); border-radius: 50%; position: absolute; bottom: 4px; }

        /* Tab Bar */
        .tabs { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--glass); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding-top: 10px; border-top: 0.5px solid #333; }
        .tab { display: flex; flex-direction: column; align-items: center; color: var(--sec); font-size: 10px; background: none; border: none; gap: 5px; width: 33%; }
        .tab.active { color: var(--blue); }
        
        /* List Items */
        .row { background: var(--card); padding: 16px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .r-info { display: flex; align-items: center; gap: 12px; }
        .r-icon { width: 44px; height: 44px; background: #2C2C2E; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div id="health-container">
            <div class="health-status" id="health-text">Financial Health: Loading...</div>
            <div class="health-bar-container"><div id="health-fill" class="health-fill"></div></div>
        </div>
    </div>

    <div id="feed" class="content active">
        <div id="warnings"></div>
        <div id="daily-feed"></div>
    </div>

    <div id="analysis" class="content">
        <div id="insights-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;"></div>
        <div style="background:var(--card); padding:20px; border-radius:20px; margin-bottom:20px;"><canvas id="pieChart"></canvas></div>
        <div id="leaderboard"></div>
    </div>

    <div id="bills" class="content">
        <div id="calendar-container"></div>
        <div class="date-label">Digital Subscriptions</div>
        <div id="sub-list"></div>
        <div class="date-label">Loans & Insurance</div>
        <div id="recur-list"></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('feed', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 14h4v7H4v-7zm6-9h4v16h-4V5zm6 9h4v7h-4v-7z"/></svg>Activity</button>
        <button class="tab" onclick="switchTab('analysis', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 2v20c-5.07-.5-9-4.79-9-10s3.93-9.5 9-10zm2.03 0v8.99H22c-.47-4.74-4.24-8.52-8.97-8.99zm0 11.01V22c4.74-.47 8.52-4.24 8.99-8.99h-8.99z"/></svg>Analysis</button>
        <button class="tab" onclick="switchTab('bills', this)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM5 16H4v-2h1V16zm0-4H4v-2h1V12zm0-4H4V6h1V8zm11 8H8v-2h8v2zm0-4H8v-2h8v2zm0-4H8V6h8v2z"/></svg>Bills</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwfHaTDIYgZi_PF48m06-XLW6_BM27v9UosZcYPFHJ_G3BcFmbdID6umg03U2G2RwLRGw/exec";
        const ICONS = { "Housing":"🏠", "Food & Dining":"🍔", "Transportation":"🚗", "Coffee":"☕", "Personal Care":"🧴", "Miscellaneous":"📦", "Groceries":"🛒", "Utilities":"⚡", "Revolut Transfers":"🏦", "Insurance & Loans":"🛡️", "Subscriptions":"📺" };
        
        let appData = null, myChart = null;

        async function init() {
            const res = await fetch(API_URL);
            appData = await res.json();
            renderAll();
        }

        function renderAll() {
            // 1. Health Bar
            const spentPct = (appData.summary.spent / appData.summary.income) * 100;
            const healthFill = document.getElementById('health-fill');
            const healthText = document.getElementById('health-text');
            healthFill.style.width = Math.min(spentPct, 100) + "%";
            
            if (spentPct > 80) { healthFill.style.background = "var(--red)"; healthText.style.color = "var(--red)"; healthText.innerText = "CRITICAL: < 20% Income Left"; }
            else if (spentPct > 70) { healthFill.style.background = "var(--orange)"; healthText.style.color = "var(--orange)"; healthText.innerText = "WARNING: 30% Income Left"; }
            else if (spentPct > 60) { healthFill.style.background = "var(--orange)"; healthText.style.color = "var(--orange)"; healthText.innerText = "CAUTION: 40% Income Left"; }
            else { healthFill.style.background = "var(--accent)"; healthText.style.color = "var(--accent)"; healthText.innerText = "Financial Health: Stable"; }

            // 2. Feed & Warnings
            const todayStr = new Date().toISOString().split('T')[0];
            const dates = Object.keys(appData.daily).sort().reverse();
            let warningHtml = "";
            for (let cat in appData.limits) {
                if (appData.categories[cat] > appData.limits[cat]) {
                    warningHtml += `<div class="warning-box">⚠️ ${cat} Exceeded by €${(appData.categories[cat] - appData.limits[cat]).toFixed(2)}</div>`;
                }
            }
            document.getElementById('warnings').innerHTML = warningHtml;

            document.getElementById('daily-feed').innerHTML = dates.map(date => {
                const isToday = date === todayStr;
                const dailyTotal = appData.daily[date].total.toFixed(2);
                const items = appData.daily[date].items.map(t => `<div class="row"><div class="r-info"><div class="r-icon">${ICONS[t.category] || "💸"}</div><div><div class="r-name">${t.merchant}</div><div class="r-cat">${t.category}</div></div></div><div class="r-amt">€${t.amount.toFixed(2)}</div></div>`).join('');
                
                if (isToday) return `<div class="today-box"><div class="day-header" style="margin-top:0"><span class="day-title">Today</span><span class="day-sum" style="color:white">Total Spent</span></div><div class="today-sum-large">€${dailyTotal}</div>${items}</div>`;
                return `<div class="day-header"><span class="day-title past">${new Date(date).toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' })}</span><span class="day-sum">€${dailyTotal}</span></div>${items}`;
            }).join('');

            // 3. Insights
            document.getElementById('insights-grid').innerHTML = `
                <div class="insight-card"><div class="insight-title">Top Merchant</div><div class="insight-val">${appData.summary.topVendor}</div></div>
                <div class="insight-card"><div class="insight-title">Top Category</div><div class="insight-val">${appData.summary.topCategory}</div></div>
                <div class="insight-card" style="border-left-color:var(--orange)"><div class="insight-title">Fixed Bills</div><div class="insight-val">€${appData.summary.subsTotal.toFixed(0)}</div></div>
                <div class="insight-card" style="border-left-color:var(--accent)"><div class="insight-title">Monthly Savings</div><div class="insight-val">€${appData.summary.saved.toFixed(0)}</div></div>
            `;

            // 4. Bills Calendar
            renderCalendar();
            document.getElementById('sub-list').innerHTML = appData.subscriptions.filter(s => s.category !== "Insurance & Loans").map(s => `<div class="row"><div class="r-info"><div class="r-icon">${ICONS[s.category] || "📺"}</div><div><div class="r-name">${s.merchant}</div><div class="r-cat">Day ${s.day}</div></div></div><div class="r-amt">€${s.amount.toFixed(2)}</div></div>`).join('');
            document.getElementById('recur-list').innerHTML = appData.subscriptions.filter(s => s.category === "Insurance & Loans").map(s => `<div class="row"><div class="r-info"><div class="r-icon">🛡️</div><div><div class="r-name">${s.merchant}</div><div class="r-cat">Monthly Payment</div></div></div><div class="r-amt">€${s.amount.toFixed(2)}</div></div>`).join('');
            
            // Pie Chart
            const labels = Object.keys(appData.categories), vals = Object.values(appData.categories);
            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut', data: { labels: labels, datasets: [{ data: vals, backgroundColor: ['#30D158', '#0A84FF', '#FF9F0A', '#5856D6', '#FF375F', '#64D2FF', '#FFD60A', '#32ADE6'], borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '78%' }
            });
        }

        function renderCalendar() {
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const today = now.getDate();
            const billDays = appData.subscriptions.map(s => parseInt(s.day));
            
            let html = `<div class="cal-grid">`;
            for (let i = 1; i <= daysInMonth; i++) {
                const isBill = billDays.includes(i);
                html += `<div class="cal-day ${i === today ? 'cal-today' : ''} ${isBill ? 'cal-bill' : ''}">${i}${isBill ? '<div class="bill-dot"></div>' : ''}</div>`;
            }
            html += `</div>`;
            document.getElementById('calendar-container').innerHTML = html;
        }

        function switchTab(id, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        init();
        document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") init(); });
    </script>
</body>
</html>
